<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Vibe Reader</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <div class="app-title">Vibe Reader</div>
        <label for="input" class="upload-btn" title="EPUB laden">Buch laden</label>
        <input type="file" id="input" accept=".epub" hidden>
    </header>

    <div id="viewer" aria-live="polite">
        <p id="placeholder">Kein Buch geladen – wähle eine EPUB-Datei.</p>
    </div>

    <aside id="toc-panel" aria-hidden="true">
        <div class="toc-header">
            <strong>Inhaltsverzeichnis</strong>
            <button id="toc-close" aria-label="Inhaltsverzeichnis schließen">✕</button>
        </div>
        <nav id="toc-list" aria-label="Kapitel-Liste"></nav>
    </aside>

    <div id="status" role="status">Bereit…</div>

    <footer id="controls">
        <button id="prev" aria-label="Vorherige Seite">← Zurück</button>
        <button id="toc" aria-label="Inhaltsverzeichnis" aria-expanded="false">Kapitel</button>
        <button id="next" aria-label="Nächste Seite">Weiter →</button>
    </footer>

    <script src="app.js"></script>
</body>
</html>
